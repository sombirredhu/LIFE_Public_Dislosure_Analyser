name: CI — Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (compile all source files)
        run: |
          python -m py_compile src/config.py
          python -m py_compile src/pdf_parser.py
          python -m py_compile src/chunker.py
          python -m py_compile src/embedder.py
          python -m py_compile src/retriever.py
          python -m py_compile src/rag_pipeline.py
          python -m py_compile src/llm_client.py
          python -m py_compile src/ingestor.py
          python -m py_compile src/definitions_manager.py
          python -m py_compile src/vector_visualizer.py
          python -m py_compile src/background_worker.py
          python -m py_compile app/streamlit_app.py

      - name: Run tests
        env:
          OPENROUTER_API_KEY: "test-key-not-real"
        run: |
          pytest tests/ -v --tb=short -x --ignore=tests/test_pdf_speed.py --ignore=tests/test_performance_benchmarks.py
